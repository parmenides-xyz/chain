syntax = "proto3";

enum OnChainEventType {
  EVENT_TYPE_NONE = 0;
  EVENT_TYPE_SIGNER = 1;
  EVENT_TYPE_ACCOUNT_REGISTER = 3;
  EVENT_TYPE_STORAGE_RENT = 4;
}

message OnChainEvent {
  OnChainEventType type = 1;
  uint32 chain_id = 2;
  uint32 block_number = 3;
  bytes block_hash = 4;
  uint64 block_timestamp = 5;
  bytes transaction_hash = 6;
  uint32 log_index = 7;
  bytes owner_address = 8;
  oneof body {
    SignerEventBody signer_event_body = 9;
    AccountRegisterEventBody account_register_event_body = 11;
    StorageRentEventBody storage_rent_event_body = 12;
  }
  uint32 tx_index = 13;
  uint32 version = 14;
}

enum SignerEventType {
  SIGNER_EVENT_TYPE_NONE = 0;
  SIGNER_EVENT_TYPE_ADD = 1;
  SIGNER_EVENT_TYPE_REMOVE = 2;
  SIGNER_EVENT_TYPE_ADMIN_RESET = 3;
}

message SignerEventBody {
  bytes key = 1;
  uint32 key_type = 2;
  SignerEventType event_type = 3;
  bytes metadata = 4;
  uint32 metadata_type = 5;
}

enum AccountRegisterEventType {
  ACCOUNT_REGISTER_EVENT_TYPE_NONE = 0;
  ACCOUNT_REGISTER_EVENT_TYPE_REGISTER = 1;
  ACCOUNT_REGISTER_EVENT_TYPE_TRANSFER = 2;
  ACCOUNT_REGISTER_EVENT_TYPE_CHANGE_RECOVERY = 3;
}

message AccountRegisterEventBody {
  bytes to = 1;
  AccountRegisterEventType event_type = 2;
  bytes from = 3;
  bytes recovery_address = 4;
}

message StorageRentEventBody {
  bytes payer = 1;
  uint32 units = 2;
  uint32 expiry = 3;
}
